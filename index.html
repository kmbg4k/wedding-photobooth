<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js HDR & PBR Template</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.185.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.185.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.16, 3.0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.16, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        let hdrRotX = -2.45;
        let hdrRotY = -17.0;

        const textureLoader = new THREE.TextureLoader();

        const plasticColorMap = textureLoader.load('./textures/plastic_color.jpg');
        const plasticNormalMap = textureLoader.load('./textures/plastic_normal.png');
        const plasticRoughnessMap = textureLoader.load('./textures/plastic_roughness.jpg');

        plasticColorMap.colorSpace = THREE.SRGBColorSpace;

        const plasticTextures = [plasticColorMap, plasticNormalMap, plasticRoughnessMap];
        plasticTextures.forEach(texture => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(10, 10);
        });

        const plasticMaterial = new THREE.MeshStandardMaterial({
            map: plasticColorMap,
            normalMap: plasticNormalMap,
            roughnessMap: plasticRoughnessMap,
            bumpMap: plasticNormalMap,
            bumpScale: 0.02,
            roughness: 0.7,
            metalness: 0.0
        });

        const smudgesTexture = textureLoader.load('./textures/smudges.jpg');
        smudgesTexture.wrapS = THREE.RepeatWrapping;
        smudgesTexture.wrapT = THREE.RepeatWrapping;
        smudgesTexture.repeat.set(0.5, 0.5);

        const scratchesTexture = textureLoader.load('./textures/scratches.jpg');
        scratchesTexture.wrapS = THREE.RepeatWrapping;
        scratchesTexture.wrapT = THREE.RepeatWrapping;
        scratchesTexture.repeat.set(0.25, 0.25);

        const metalMaterial = new THREE.MeshStandardMaterial({
            color: 0xe0e0e0,
            metalness: 0.95,
            roughness: 1.5,
            roughnessMap: smudgesTexture,
            bumpMap: scratchesTexture,
            bumpScale: 0.1,
            displacementMap: scratchesTexture,
            displacementScale: 0.0005,
            envMapIntensity: 1.2
        });

        const rgbeLoader = new RGBELoader();
        const hdrUrl = './assets/studio_kontrast_02_2k.hdr';

        rgbeLoader.load(hdrUrl, (texture) => {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.background = texture;
            scene.environment = texture;
        });

        const bgShape = new THREE.Shape();
        bgShape.moveTo(-15, -15);
        bgShape.lineTo(15, -15);
        bgShape.lineTo(15, 15);
        bgShape.lineTo(-15, 15);
        bgShape.lineTo(-15, -15);

        const bgHole = new THREE.Path();
        bgHole.moveTo(-0.2, -0.45);
        bgHole.lineTo(0.2, -0.45);
        bgHole.lineTo(0.2, 0.45);
        bgHole.lineTo(-0.2, 0.45);
        bgHole.lineTo(-0.2, -0.45);
        bgShape.holes.push(bgHole);

        const bgGeometry = new THREE.ShapeGeometry(bgShape);
        
        const bgUv = bgGeometry.attributes.uv;
        for (let i = 0; i < bgUv.count; i++) {
            bgUv.setXY(i, (bgUv.getX(i) + 15) / 30, (bgUv.getY(i) + 15) / 30);
        }
        bgUv.needsUpdate = true;

        const bgPlane = new THREE.Mesh(bgGeometry, plasticMaterial);
        bgPlane.position.z = -0.005;
        scene.add(bgPlane);

        const shape = new THREE.Shape();
        shape.moveTo(-0.3, -0.6);
        shape.lineTo(0.3, -0.6);
        shape.lineTo(0.3, 0.6);
        shape.lineTo(-0.3, 0.6);
        shape.lineTo(-0.3, -0.6);

        const hole = new THREE.Path();
        shape.holes.push(hole);
        hole.moveTo(-0.2, -0.45);
        hole.lineTo(0.2, -0.45);
        hole.lineTo(0.2, 0.45);
        hole.lineTo(-0.2, 0.45);
        hole.lineTo(-0.2, -0.45);

        const extrudeSettings = {
            steps: 4,
            depth: 0.15,
            bevelEnabled: true,
            bevelThickness: 0.005,
            bevelSize: 0.005,
            bevelOffset: 0,
            bevelSegments: 3
        };

        const metalGeometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        metalGeometry.center();

        const metalMesh = new THREE.Mesh(metalGeometry, metalMaterial);
        metalMesh.position.set(0, 0, -0.075);
        scene.add(metalMesh);

        const pocketBackingGeometry = new THREE.BoxGeometry(0.4, 0.9, 0.01);
        const pocketBacking = new THREE.Mesh(pocketBackingGeometry, metalMaterial);
        pocketBacking.position.set(0, 0, -0.07);
        metalMesh.add(pocketBacking);

        const pocketWallLeftGeom = new THREE.BoxGeometry(0.01, 0.9, 0.14);
        const pocketWallLeft = new THREE.Mesh(pocketWallLeftGeom, metalMaterial);
        pocketWallLeft.position.set(-0.195, 0, 0);
        metalMesh.add(pocketWallLeft);

        const pocketWallRightGeom = new THREE.BoxGeometry(0.01, 0.9, 0.14);
        const pocketWallRight = new THREE.Mesh(pocketWallRightGeom, metalMaterial);
        pocketWallRight.position.set(0.195, 0, 0);
        metalMesh.add(pocketWallRight);

        const pocketWallBottomGeom = new THREE.BoxGeometry(0.4, 0.01, 0.14);
        const pocketWallBottom = new THREE.Mesh(pocketWallBottomGeom, metalMaterial);
        pocketWallBottom.position.set(0, -0.445, 0);
        metalMesh.add(pocketWallBottom);

        const labelShape = new THREE.Shape();
        labelShape.moveTo(-0.3, -0.15);
        labelShape.lineTo(0.3, -0.15);
        labelShape.lineTo(0.3, 0.15);
        labelShape.lineTo(-0.3, 0.15);
        labelShape.lineTo(-0.3, -0.15);

        const labelExtrudeSettings = {
            steps: 4,
            depth: 0.02,
            bevelEnabled: true,
            bevelThickness: 0.004,
            bevelSize: 0.004,
            bevelOffset: 0,
            bevelSegments: 3
        };

        const labelGeometry = new THREE.ExtrudeGeometry(labelShape, labelExtrudeSettings);
        labelGeometry.center();

        const labelMaterial = metalMaterial.clone();
        labelMaterial.needsUpdate = true;
        const labelMesh = new THREE.Mesh(labelGeometry, labelMaterial);
        labelMesh.position.set(0, 0.82, -0.01);
        scene.add(labelMesh);

        const textCanvas = document.createElement('canvas');
        textCanvas.width = 512;
        textCanvas.height = 256;
        const tCtx = textCanvas.getContext('2d');

        tCtx.clearRect(0, 0, 512, 256);
        tCtx.font = '36px Arial, Helvetica, sans-serif';
        tCtx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        tCtx.textAlign = 'center';
        tCtx.textBaseline = 'middle';

        tCtx.fillText('PHOTOS', 256, 84);
        tCtx.fillText('DELIVERED HERE', 256, 127);
        tCtx.fillText('IN 4 MINUTES', 256, 170);

        const textTexture = new THREE.CanvasTexture(textCanvas);
        textTexture.colorSpace = THREE.SRGBColorSpace;

        const textMaterial = new THREE.MeshStandardMaterial({
            map: textTexture,
            transparent: true,
            roughness: 0.6,
            metalness: 0.0
        });

        const textGeometry = new THREE.PlaneGeometry(0.592, 0.292);
        const textMesh = new THREE.Mesh(textGeometry, textMaterial);
        textMesh.position.set(0, 0, 0.015);
        labelMesh.add(textMesh);

        const photoFrontTexture = textureLoader.load('./textures/photo-booth-strip-front.png');
        const photoBackTexture = textureLoader.load('./textures/photo-booth-strip-back.png');
        const paperRoughnessMap = textureLoader.load('./textures/paper_roughness.jpeg');
        const paperDisplacementMap = textureLoader.load('./textures/paper_displacement.jpeg');
        
        photoFrontTexture.colorSpace = THREE.SRGBColorSpace;
        photoBackTexture.colorSpace = THREE.SRGBColorSpace;
        
        const paperTextures = [photoFrontTexture, photoBackTexture, paperRoughnessMap, paperDisplacementMap];
        paperTextures.forEach(texture => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(1, 1);
        });

        const photoGeometry = new THREE.BoxGeometry(0.22, 0.75, 0.001);
        const edgeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const photoFrontMaterial = new THREE.MeshStandardMaterial({ 
            map: photoFrontTexture, 
            roughnessMap: paperDisplacementMap,
            roughness: 0.8,
            bumpMap: paperRoughnessMap,
            bumpScale: 1.0,
            displacementMap: paperDisplacementMap,
            displacementScale: 0.0002,
            metalness: 0.0 
        });
        const photoBackMaterial = new THREE.MeshStandardMaterial({ 
            map: photoBackTexture, 
            roughnessMap: paperDisplacementMap,
            roughness: 0.8,
            bumpMap: paperRoughnessMap,
            bumpScale: 10.0,
            displacementMap: paperDisplacementMap,
            displacementScale: 0.0002,
            metalness: 0.0 
        });

        const photoMesh = new THREE.Mesh(photoGeometry, [edgeMaterial, edgeMaterial, edgeMaterial, edgeMaterial, photoFrontMaterial, photoBackMaterial]);
        photoMesh.position.set(0, 0.9, 0.02);
        metalMesh.add(photoMesh);

        let photoY = 0.9;
        let photoRotX = 0;
        let velocityY = 0;
        const gravity = 0.0038;
        const bounceDamping = -0.12;
        let isSettled = true; 
        let isInspecting = false;
        let isAnimatingToCenter = false;
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let photoScale = 1.0;

        setTimeout(() => {
            isSettled = false;
        }, 3000);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(photoMesh);
            
            if (intersects.length > 0) {
                controls.enabled = false;
            }

            if (isInspecting && !isAnimatingToCenter) {
                if (intersects.length > 0) {
                    isDragging = true;
                    prevMouse.x = event.clientX;
                    prevMouse.y = event.clientY;
                }
            } else if (isSettled && !isInspecting) {
                if (intersects.length > 0) {
                    isAnimatingToCenter = true;
                    isInspecting = true;
                    scene.attach(photoMesh);
                }
            }
        });

        window.addEventListener('mousemove', (event) => {
            if (isDragging) {
                const dx = event.clientX - prevMouse.x;
                const dy = event.clientY - prevMouse.y;
                photoMesh.rotation.y += dx * 0.01;
                photoMesh.rotation.x += dy * 0.01;
                prevMouse.x = event.clientX;
                prevMouse.y = event.clientY;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            controls.enabled = true;
        });

        window.addEventListener('wheel', (event) => {
            if (isInspecting) {
                event.preventDefault();
                photoScale += event.deltaY * -0.001;
                photoScale = Math.max(0.5, Math.min(3.0, photoScale));
                photoMesh.scale.set(photoScale, photoScale, photoScale);
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            scene.backgroundRotation.set(hdrRotX, hdrRotY, 0);
            scene.environmentRotation.set(hdrRotX, hdrRotY, 0);

            if (isAnimatingToCenter) {
                photoMesh.position.lerp(new THREE.Vector3(0, 0.16, 1.8), 0.1);
                photoMesh.rotation.x *= 0.9;
                photoMesh.rotation.y *= 0.9;
                photoMesh.rotation.z *= 0.9;
                
                if (photoMesh.position.distanceTo(new THREE.Vector3(0, 0.16, 1.8)) < 0.01) {
                    isAnimatingToCenter = false;
                    photoMesh.position.set(0, 0.16, 1.8);
                    photoMesh.rotation.set(0, 0, 0);
                }
            } else if (!isInspecting) {
                if (!isSettled) {
                    velocityY += gravity;
                    photoY -= velocityY;

                    const targetY = -0.06;

                    if (photoY <= targetY) {
                        photoY = targetY;
                        velocityY = velocityY * bounceDamping;

                        if (Math.abs(velocityY) < 0.0015) {
                            photoY = targetY;
                            isSettled = true;
                        }
                    }

                    const progress = Math.max(0, Math.min(1, (0.9 - photoY) / 0.96));
                    photoRotX = progress * -0.06;
                    
                    photoMesh.position.y = photoY;
                    photoMesh.rotation.x = photoRotX;
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
