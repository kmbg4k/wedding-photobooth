<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bret at Kyla</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
        }

        /* ─── Navigation Overlay ─────────────────────────────── */
        #nav-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: center;
            padding: 0 16px 24px;
        }

        #nav-card {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            max-width: 420px;
            width: 100%;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #nav-card.hidden {
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
        }

        #nav-primary {
            color: rgba(255, 255, 255, 0.92);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-align: center;
            line-height: 1.4;
        }

        #nav-secondary {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.55);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .nav-hint svg {
            flex-shrink: 0;
            opacity: 0.7;
        }

        /* Pulse animation for the primary hint */
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        #nav-primary.pulse {
            animation: subtle-pulse 2.2s ease-in-out infinite;
        }

        /* Responsive tweaks */
        @media (max-width: 480px) {
            #nav-card {
                padding: 12px 16px;
                gap: 8px;
                border-radius: 12px;
            }
            #nav-primary {
                font-size: 13px;
            }
            .nav-hint {
                font-size: 11px;
                gap: 5px;
            }
            #nav-overlay {
                padding: 0 12px 16px;
            }
        }

        @media (min-width: 768px) {
            #nav-overlay {
                padding: 0 24px 28px;
            }
        }
    </style>
</head>
<body>

    <!-- ─── Navigation UI Overlay ────────────────────────────── -->
    <div id="nav-overlay">
        <div id="nav-card">
            <div id="nav-primary" class="pulse">Waiting for photo strip…</div>
            <div id="nav-secondary"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.185.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.185.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // ─── Device Detection ──────────────────────────────────
        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // ─── Navigation Overlay Logic ──────────────────────────
        const navPrimary = document.getElementById('nav-primary');
        const navSecondary = document.getElementById('nav-secondary');
        const navCard = document.getElementById('nav-card');

        // SVG icons as inline strings
        const icons = {
            click: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/></svg>`,
            tap: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,
            drag: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>`,
            scroll: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="3" width="12" height="18" rx="2"/><line x1="12" y1="7" x2="12" y2="11"/><line x1="12" y1="13" x2="12" y2="13.01"/></svg>`,
            pinch: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12l7-7"/><polyline points="15 5 19 5 19 9"/></svg>`,
            back: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
        };

        function setNavHints(primary, secondaryItems = []) {
            navPrimary.textContent = primary;
            navSecondary.innerHTML = '';
            secondaryItems.forEach(item => {
                const span = document.createElement('span');
                span.className = 'nav-hint';
                span.innerHTML = item.icon + item.text;
                navSecondary.appendChild(span);
            });
        }

        // Nav states
        function showNavWaiting() {
            navPrimary.classList.add('pulse');
            setNavHints('Photo strip dropping into frame…');
        }
        function showNavSettled() {
            navPrimary.classList.remove('pulse');
            if (isMobile) {
                setNavHints('Tap the photo to inspect it', [
                    { icon: icons.tap, text: 'Tap photo' },
                ]);
            } else {
                setNavHints('Click the photo to inspect it', [
                    { icon: icons.click, text: 'Click photo' },
                ]);
            }
            // Add a subtle pulse to draw attention
            navPrimary.classList.add('pulse');
        }
        function showNavAnimating() {
            navPrimary.classList.remove('pulse');
            setNavHints('Picking up photo…');
        }
        function showNavInspecting() {
            navPrimary.classList.remove('pulse');
            if (isMobile) {
                setNavHints('Inspecting photo', [
                    { icon: icons.drag, text: 'Drag to rotate' },
                    { icon: icons.pinch, text: 'Pinch to zoom' },
                    { icon: icons.back, text: 'Double-tap to return' },
                ]);
            } else {
                setNavHints('Inspecting photo', [
                    { icon: icons.drag, text: 'Drag to rotate' },
                    { icon: icons.scroll, text: 'Scroll to zoom' },
                    { icon: icons.back, text: 'Double-click to return' },
                ]);
            }
        }

        // Start with waiting state
        showNavWaiting();

        // ─── Scene Setup ───────────────────────────────────────
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            50,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0.16, 3.0);
        camera.lookAt(0, 0.16, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // ─── HDR Rotation ──────────────────────────────────────
        let hdrRotX = -2.45;
        let hdrRotY = -17.0;

        // ─── Textures ──────────────────────────────────────────
        const textureLoader = new THREE.TextureLoader();

        const plasticColorMap = textureLoader.load('./textures/plastic_color.jpg');
        const plasticNormalMap = textureLoader.load('./textures/plastic_normal.png');
        const plasticRoughnessMap = textureLoader.load('./textures/plastic_roughness.jpg');

        plasticColorMap.colorSpace = THREE.SRGBColorSpace;

        [plasticColorMap, plasticNormalMap, plasticRoughnessMap].forEach(t => {
            t.wrapS = THREE.RepeatWrapping;
            t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(10, 10);
        });

        const plasticMaterial = new THREE.MeshStandardMaterial({
            map: plasticColorMap,
            normalMap: plasticNormalMap,
            roughnessMap: plasticRoughnessMap,
            bumpMap: plasticNormalMap,
            bumpScale: 0.02,
            roughness: 0.7,
            metalness: 0.0
        });

        const smudgesTexture = textureLoader.load('./textures/smudges.jpg');
        smudgesTexture.wrapS = THREE.RepeatWrapping;
        smudgesTexture.wrapT = THREE.RepeatWrapping;
        smudgesTexture.repeat.set(0.5, 0.5);

        const scratchesTexture = textureLoader.load('./textures/scratches.jpg');
        scratchesTexture.wrapS = THREE.RepeatWrapping;
        scratchesTexture.wrapT = THREE.RepeatWrapping;
        scratchesTexture.repeat.set(0.25, 0.25);

        const metalMaterial = new THREE.MeshStandardMaterial({
            color: 0xe0e0e0,
            metalness: 0.95,
            roughness: 1.5,
            roughnessMap: smudgesTexture,
            bumpMap: scratchesTexture,
            bumpScale: 0.1,
            displacementMap: scratchesTexture,
            displacementScale: 0.0005,
            envMapIntensity: 1.2
        });

        // ─── HDR Environment ───────────────────────────────────
        new RGBELoader().load('./assets/studio_kontrast_02_2k.hdr', (texture) => {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.background = texture;
            scene.environment = texture;
        });

        // ─── Background Plane with Hole ────────────────────────
        const bgShape = new THREE.Shape();
        bgShape.moveTo(-15, -15);
        bgShape.lineTo(15, -15);
        bgShape.lineTo(15, 15);
        bgShape.lineTo(-15, 15);
        bgShape.lineTo(-15, -15);

        const bgHole = new THREE.Path();
        bgHole.moveTo(-0.2, -0.45);
        bgHole.lineTo(0.2, -0.45);
        bgHole.lineTo(0.2, 0.45);
        bgHole.lineTo(-0.2, 0.45);
        bgHole.lineTo(-0.2, -0.45);
        bgShape.holes.push(bgHole);

        const bgGeometry = new THREE.ShapeGeometry(bgShape);
        const bgUv = bgGeometry.attributes.uv;
        for (let i = 0; i < bgUv.count; i++) {
            bgUv.setXY(i, (bgUv.getX(i) + 15) / 30, (bgUv.getY(i) + 15) / 30);
        }
        bgUv.needsUpdate = true;

        const bgPlane = new THREE.Mesh(bgGeometry, plasticMaterial);
        bgPlane.position.z = -0.005;
        scene.add(bgPlane);

        // ─── Metal Frame ───────────────────────────────────────
        const shape = new THREE.Shape();
        shape.moveTo(-0.3, -0.6);
        shape.lineTo(0.3, -0.6);
        shape.lineTo(0.3, 0.6);
        shape.lineTo(-0.3, 0.6);
        shape.lineTo(-0.3, -0.6);

        const hole = new THREE.Path();
        hole.moveTo(-0.2, -0.45);
        hole.lineTo(0.2, -0.45);
        hole.lineTo(0.2, 0.45);
        hole.lineTo(-0.2, 0.45);
        hole.lineTo(-0.2, -0.45);
        shape.holes.push(hole);

        const metalGeometry = new THREE.ExtrudeGeometry(shape, {
            steps: 4,
            depth: 0.15,
            bevelEnabled: true,
            bevelThickness: 0.005,
            bevelSize: 0.005,
            bevelOffset: 0,
            bevelSegments: 3
        });
        metalGeometry.center();

        const metalMesh = new THREE.Mesh(metalGeometry, metalMaterial);
        metalMesh.position.set(0, 0, -0.075);
        scene.add(metalMesh);

        // Pocket walls
        const pocketBacking = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.9, 0.01), metalMaterial
        );
        pocketBacking.position.set(0, 0, -0.07);
        metalMesh.add(pocketBacking);

        const pocketWallLeft = new THREE.Mesh(
            new THREE.BoxGeometry(0.01, 0.9, 0.14), metalMaterial
        );
        pocketWallLeft.position.set(-0.195, 0, 0);
        metalMesh.add(pocketWallLeft);

        const pocketWallRight = new THREE.Mesh(
            new THREE.BoxGeometry(0.01, 0.9, 0.14), metalMaterial
        );
        pocketWallRight.position.set(0.195, 0, 0);
        metalMesh.add(pocketWallRight);

        const pocketWallBottom = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.01, 0.14), metalMaterial
        );
        pocketWallBottom.position.set(0, -0.445, 0);
        metalMesh.add(pocketWallBottom);

        // ─── Label ─────────────────────────────────────────────
        const labelShape = new THREE.Shape();
        labelShape.moveTo(-0.3, -0.15);
        labelShape.lineTo(0.3, -0.15);
        labelShape.lineTo(0.3, 0.15);
        labelShape.lineTo(-0.3, 0.15);
        labelShape.lineTo(-0.3, -0.15);

        const labelGeometry = new THREE.ExtrudeGeometry(labelShape, {
            steps: 4,
            depth: 0.02,
            bevelEnabled: true,
            bevelThickness: 0.004,
            bevelSize: 0.004,
            bevelOffset: 0,
            bevelSegments: 3
        });
        labelGeometry.center();

        const labelMaterial = metalMaterial.clone();
        const labelMesh = new THREE.Mesh(labelGeometry, labelMaterial);
        labelMesh.position.set(0, 0.82, -0.01);
        scene.add(labelMesh);

        // Label text
        const textCanvas = document.createElement('canvas');
        textCanvas.width = 512;
        textCanvas.height = 256;
        const tCtx = textCanvas.getContext('2d');
        tCtx.clearRect(0, 0, 512, 256);
        tCtx.font = '36px Arial, Helvetica, sans-serif';
        tCtx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        tCtx.textAlign = 'center';
        tCtx.textBaseline = 'middle';
        tCtx.fillText('PHOTOS', 256, 84);
        tCtx.fillText('DELIVERED HERE', 256, 127);
        tCtx.fillText('IN 4 MINUTES', 256, 170);

        const textTexture = new THREE.CanvasTexture(textCanvas);
        textTexture.colorSpace = THREE.SRGBColorSpace;

        const textMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(0.592, 0.292),
            new THREE.MeshStandardMaterial({
                map: textTexture,
                transparent: true,
                roughness: 0.6,
                metalness: 0.0
            })
        );
        textMesh.position.set(0, 0, 0.015);
        labelMesh.add(textMesh);

        // ─── Photo Strip ───────────────────────────────────────
        const photoFrontTexture = textureLoader.load('./textures/photo-booth-strip-front.png');
        const photoBackTexture = textureLoader.load('./textures/photo-booth-strip-back.png');
        const paperRoughnessMap = textureLoader.load('./textures/paper_roughness.jpeg');
        const paperDisplacementMap = textureLoader.load('./textures/paper_displacement.jpeg');

        photoFrontTexture.colorSpace = THREE.SRGBColorSpace;
        photoBackTexture.colorSpace = THREE.SRGBColorSpace;

        [photoFrontTexture, photoBackTexture, paperRoughnessMap, paperDisplacementMap].forEach(t => {
            t.wrapS = THREE.RepeatWrapping;
            t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(1, 1);
        });

        const edgeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        const photoFrontMaterial = new THREE.MeshStandardMaterial({
            map: photoFrontTexture,
            roughnessMap: paperDisplacementMap,
            roughness: 0.8,
            bumpMap: paperRoughnessMap,
            bumpScale: 1.0,
            displacementMap: paperDisplacementMap,
            displacementScale: 0.0002,
            metalness: 0.0
        });
        const photoBackMaterial = new THREE.MeshStandardMaterial({
            map: photoBackTexture,
            roughnessMap: paperDisplacementMap,
            roughness: 0.8,
            bumpMap: paperRoughnessMap,
            bumpScale: 10.0,
            displacementMap: paperDisplacementMap,
            displacementScale: 0.0002,
            metalness: 0.0
        });

        const photoGeometry = new THREE.BoxGeometry(0.22, 0.75, 0.001);
        const photoMesh = new THREE.Mesh(photoGeometry, [
            edgeMaterial, edgeMaterial,
            edgeMaterial, edgeMaterial,
            photoFrontMaterial, photoBackMaterial
        ]);
        photoMesh.position.set(0, 0.9, 0.02);
        metalMesh.add(photoMesh);

        // ─── Animation State ───────────────────────────────────
        let photoY = 0.9;
        let photoRotX = 0;
        let velocityY = 0;
        const gravity = 0.0038;
        const bounceDamping = -0.12;
        let isSettled = true;
        let isInspecting = false;
        let isAnimatingToCenter = false;
        let isAnimatingReturn = false;
        let isDragging = false;
        let prevPointer = { x: 0, y: 0 };
        let photoScale = 1.0;

        const inspectTarget = new THREE.Vector3(0, 0.16, 1.8);

        // Store original local position in frame
        const frameLocalPos = new THREE.Vector3(0, -0.06, 0.02);
        const frameLocalRot = new THREE.Euler(-0.06, 0, 0);

        setTimeout(() => {
            isSettled = false;
            showNavWaiting();
        }, 3000);

        // ─── Return Photo to Frame ─────────────────────────────
        let returnStartPos = new THREE.Vector3();
        let returnStartRot = new THREE.Euler();
        let returnStartScale = 1;
        let returnProgress = 0;

        function startReturn() {
            if (!isInspecting || isAnimatingToCenter || isAnimatingReturn) return;
            isAnimatingReturn = true;
            returnProgress = 0;
            returnStartPos.copy(photoMesh.position);
            returnStartRot.copy(photoMesh.rotation);
            returnStartScale = photoScale;
            isDragging = false;
        }

        // ─── Raycaster ────────────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function getPointerNDC(clientX, clientY) {
            return {
                x: (clientX / window.innerWidth) * 2 - 1,
                y: -(clientY / window.innerHeight) * 2 + 1
            };
        }

        function hitsPhoto(clientX, clientY) {
            const ndc = getPointerNDC(clientX, clientY);
            pointer.set(ndc.x, ndc.y);
            raycaster.setFromCamera(pointer, camera);
            return raycaster.intersectObject(photoMesh, false).length > 0;
        }

        // ─── Double-click / Double-tap detection ──────────────
        let lastClickTime = 0;
        let lastClickPos = { x: 0, y: 0 };

        function isDoubleAction(clientX, clientY) {
            const now = Date.now();
            const dx = clientX - lastClickPos.x;
            const dy = clientY - lastClickPos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const isDouble = (now - lastClickTime < 400) && (dist < 30);
            lastClickTime = now;
            lastClickPos.x = clientX;
            lastClickPos.y = clientY;
            return isDouble;
        }

        // ─── MOUSE Events ─────────────────────────────────────
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (!hitsPhoto(e.clientX, e.clientY)) return;

            if (isInspecting && !isAnimatingToCenter && !isAnimatingReturn) {
                // Check double-click
                if (isDoubleAction(e.clientX, e.clientY)) {
                    startReturn();
                    return;
                }
                // Start dragging to rotate
                isDragging = true;
                prevPointer.x = e.clientX;
                prevPointer.y = e.clientY;
            } else if (isSettled && !isInspecting) {
                // Pick up the photo
                isAnimatingToCenter = true;
                isInspecting = true;
                scene.attach(photoMesh);
                showNavAnimating();
            }
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - prevPointer.x;
            const dy = e.clientY - prevPointer.y;
            photoMesh.rotation.y += dx * 0.01;
            photoMesh.rotation.x += dy * 0.01;
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        });

        renderer.domElement.addEventListener('mouseup', () => {
            isDragging = false;
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            if (!isInspecting) return;
            e.preventDefault();
            photoScale += e.deltaY * -0.001;
            photoScale = THREE.MathUtils.clamp(photoScale, 0.5, 3.0);
            photoMesh.scale.setScalar(photoScale);
        }, { passive: false });

        // ─── TOUCH Events (Mobile) ────────────────────────────
        let lastTouchDist = 0;
        let touchCount = 0;
        let lastTapTime = 0;
        let lastTapPos = { x: 0, y: 0 };

        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchCount = e.touches.length;

            if (touchCount === 1) {
                const t = e.touches[0];

                if (!hitsPhoto(t.clientX, t.clientY)) return;

                if (isInspecting && !isAnimatingToCenter && !isAnimatingReturn) {
                    // Check double-tap
                    const now = Date.now();
                    const dx = t.clientX - lastTapPos.x;
                    const dy = t.clientY - lastTapPos.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if ((now - lastTapTime < 400) && (dist < 30)) {
                        startReturn();
                        lastTapTime = 0;
                        return;
                    }
                    lastTapTime = now;
                    lastTapPos.x = t.clientX;
                    lastTapPos.y = t.clientY;

                    // Start dragging to rotate
                    isDragging = true;
                    prevPointer.x = t.clientX;
                    prevPointer.y = t.clientY;
                } else if (isSettled && !isInspecting) {
                    isAnimatingToCenter = true;
                    isInspecting = true;
                    scene.attach(photoMesh);
                    showNavAnimating();
                }
            }

            if (touchCount === 2 && isInspecting) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.hypot(dx, dy);
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();

            if (touchCount === 1 && isDragging) {
                const t = e.touches[0];
                const dx = t.clientX - prevPointer.x;
                const dy = t.clientY - prevPointer.y;
                photoMesh.rotation.y += dx * 0.01;
                photoMesh.rotation.x += dy * 0.01;
                prevPointer.x = t.clientX;
                prevPointer.y = t.clientY;
            }

            if (e.touches.length === 2 && isInspecting) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const delta = dist - lastTouchDist;
                photoScale += delta * 0.005;
                photoScale = THREE.MathUtils.clamp(photoScale, 0.5, 3.0);
                photoMesh.scale.setScalar(photoScale);
                lastTouchDist = dist;
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchCount = e.touches.length;
            if (touchCount === 0) {
                isDragging = false;
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchcancel', (e) => {
            isDragging = false;
            touchCount = 0;
        });

        // ─── Resize ────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        // ─── Ease function for return ──────────────────────────
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // ─── Render Loop ───────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);

            scene.backgroundRotation.set(hdrRotX, hdrRotY, 0);
            scene.environmentRotation.set(hdrRotX, hdrRotY, 0);

            if (isAnimatingToCenter) {
                photoMesh.position.lerp(inspectTarget, 0.1);
                photoMesh.rotation.x *= 0.9;
                photoMesh.rotation.y *= 0.9;
                photoMesh.rotation.z *= 0.9;

                if (photoMesh.position.distanceTo(inspectTarget) < 0.01) {
                    isAnimatingToCenter = false;
                    photoMesh.position.copy(inspectTarget);
                    photoMesh.rotation.set(0, 0, 0);
                    showNavInspecting();
                }
            } else if (isAnimatingReturn) {
                returnProgress += 0.025;
                const t = easeInOutCubic(Math.min(returnProgress, 1));

                // We need world position of where the photo should go
                const targetWorldPos = new THREE.Vector3();
                metalMesh.localToWorld(targetWorldPos.copy(frameLocalPos));

                photoMesh.position.lerpVectors(returnStartPos, targetWorldPos, t);
                photoMesh.rotation.x = returnStartRot.x + (frameLocalRot.x - returnStartRot.x) * t;
                photoMesh.rotation.y = returnStartRot.y * (1 - t);
                photoMesh.rotation.z = returnStartRot.z * (1 - t);

                const s = returnStartScale + (1 - returnStartScale) * t;
                photoMesh.scale.setScalar(s);

                if (returnProgress >= 1) {
                    isAnimatingReturn = false;
                    isInspecting = false;
                    photoScale = 1.0;
                    photoMesh.scale.setScalar(1.0);
                    // Re-parent back to metalMesh
                    metalMesh.attach(photoMesh);
                    photoMesh.position.copy(frameLocalPos);
                    photoMesh.rotation.copy(frameLocalRot);
                    photoY = -0.06;
                    isSettled = true;
                    showNavSettled();
                }
            } else if (!isInspecting && !isSettled) {
                velocityY += gravity;
                photoY -= velocityY;

                const targetY = -0.06;

                if (photoY <= targetY) {
                    photoY = targetY;
                    velocityY *= bounceDamping;

                    if (Math.abs(velocityY) < 0.0015) {
                        photoY = targetY;
                        isSettled = true;
                        showNavSettled();
                    }
                }

                const progress = Math.max(0, Math.min(1, (0.9 - photoY) / 0.96));
                photoRotX = progress * -0.06;

                photoMesh.position.y = photoY;
                photoMesh.rotation.x = photoRotX;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
